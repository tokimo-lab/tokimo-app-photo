# Tokimo app manifest（供主 server 读取，注册 / spawn / 资源代理 / launchpad 展示）
[app]
id          = "photo"
display     = "Photo"
version     = "0.1.0"
description = "Tokimo Photo — 库 / 浏览 / AI (OCR / CLIP / 人脸) / 地理 / 相册"

[runtime]
lifecycle    = "resident"
binary       = "tokimo-app-photo"
ui_dist      = "ui/dist"

[ui]
entry        = "assets/index.js"
window_type  = "photo"
category     = "app"
icon         = "Camera"
image        = "icon.png"
color        = "#8b5cf6"
width        = 1200
height       = 800


[database]
schema         = "photo"
migrations_dir = "migrations"
driver         = "postgres"
