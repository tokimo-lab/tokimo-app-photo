[package]
name        = "tokimo-app-photo"
version     = "0.1.0"
edition     = "2024"
rust-version = "1.94.0"
license     = "MIT OR Apache-2.0"
description = "Tokimo Photo app — standalone multi-process photo library manager."

[dependencies]
tokimo-bus-client   = { git = "https://github.com/tokimo-lab/tokimo-bus.git", rev = "80063cb4391c5249df9cd3b570b1eabed64c3843" }
tokimo-bus-protocol = { git = "https://github.com/tokimo-lab/tokimo-bus.git", rev = "80063cb4391c5249df9cd3b570b1eabed64c3843", features = ["axum"] }
tokimo-bus-auth     = { git = "https://github.com/tokimo-lab/tokimo-bus.git", rev = "80063cb4391c5249df9cd3b570b1eabed64c3843", features = ["axum", "cli-db"] }
tokimo-bus-cli      = { git = "https://github.com/tokimo-lab/tokimo-bus.git", rev = "80063cb4391c5249df9cd3b570b1eabed64c3843" }
tokimo-vfs          = { git = "https://github.com/tokimo-lab/tokimo-package-vfs.git", rev = "17e3c7a9" }
tokimo-package-client-api = { path = "../../packages/tokimo-package-client-api" }
tokimo-perception   = { path = "../../packages/tokimo-perception" }
tokimo-package-ffmpeg = { path = "../../packages/tokimo-package-ffmpeg" }
tokimo-package-utils  = { path = "../../packages/tokimo-package-utils" }
dashmap             = "6"
futures-util        = "0.3"

clap              = { version = "4", features = ["derive", "env"] }
tokio             = { version = "1", features = ["rt-multi-thread", "macros", "time", "signal", "sync"] }
tracing           = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde             = { version = "1", features = ["derive"] }
serde_json        = "1"
uuid              = { version = "1", features = ["v4", "serde"] }
chrono            = { version = "0.4", features = ["serde"] }
sea-orm           = { version = "2.0.0-rc.38", default-features = false, features = ["sqlx-postgres", "runtime-tokio-rustls", "with-uuid", "with-json", "with-chrono", "macros"] }
rust-embed        = { version = "8", features = ["debug-embed"] }
mime_guess        = "2"
anyhow            = "1"
axum              = { version = "0.8", features = ["json"] }
tokio-util        = { version = "0.7", features = ["io"] }
urlencoding       = "2"
reqwest           = { workspace = true }
tower-http        = { version = "0.6", features = ["fs"] }
tower             = "0.5"
bytes             = "1"
parking_lot       = "0.12"

[profile.release]
lto       = "thin"
opt-level = 3
strip     = "symbols"

[workspace]
members = ["."]

[workspace.dependencies]
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "stream", "json"] }

[workspace.lints.rust]
unsafe_code     = "warn"
unused_must_use = "deny"

[workspace.lints.clippy]
all      = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
wildcard_imports        = "allow"
module_name_repetitions = "allow"
must_use_candidate      = "allow"
missing_errors_doc      = "allow"
missing_panics_doc      = "allow"
items_after_statements  = "allow"
struct_excessive_bools  = "allow"
similar_names           = "allow"
many_single_char_names  = "allow"
unnecessary_literal_bound = "allow"
doc_markdown            = "allow"
ref_option              = "allow"

